name: Build DCode for All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install anthropic

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name "DCode" --icon=assets/icon.ico dcode.py
        continue-on-error: true

      - name: Build Windows EXE (no icon)
        run: |
          pyinstaller --onefile --windowed --name "DCode" dcode.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: DCode-Windows
          path: dist/DCode.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install anthropic

      - name: Build Mac APP
        run: |
          pyinstaller --onefile --windowed --name "DCode" dcode.py

      - name: Zip Mac App
        run: |
          cd dist
          zip -r DCode-Mac.zip DCode

      - name: Upload Mac App
        uses: actions/upload-artifact@v4
        with:
          name: DCode-Mac
          path: dist/DCode-Mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install anthropic
          sudo apt-get install -y python3-tk

      - name: Build Linux Binary
        run: |
          pyinstaller --onefile --name "DCode" dcode.py

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: DCode-Linux
          path: dist/DCode

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            DCode-Windows/DCode.exe
            DCode-Mac/DCode-Mac.zip
            DCode-Linux/DCode
          body: |
            ## ⬡ DCode — AI Code Editor

            Download for your OS below ↓

            | OS | File | Instructions |
            |---|---|---|
            | Windows | DCode.exe | Double click to run |
            | Mac | DCode-Mac.zip | Unzip → Double click DCode |
            | Linux | DCode | chmod +x DCode → ./DCode |

            ## Features
            - 12+ language syntax highlighting
            - Claude AI — explain, fix, generate
            - Voice-to-code input
            - Code snippets library
            - Real Python execution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
